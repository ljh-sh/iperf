name: release

# Publish stage: tag a v* (or trigger manually) → GitHub Release with
# per-target tarball/zip + per-archive sha256 + top-level SHA256SUMS.
#
# Splits cleanly with `build-and-test.yml`:
#   - push / pull_request → build-and-test.yml (auto-test stage)
#   - tag push / dispatch → THIS workflow (publish stage)
#
# Build matrix is intentionally identical to build-and-test.yml so a
# tag push produces a release in one shot, without depending on a
# separate workflow_run pull. Trade-off: a tag push runs the matrix
# twice (here + in build-and-test.yml) ≈ +2 min — accepted for the
# simpler workflow_run-free model.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-14,         os: macos                  }
          - { target: x86_64-macos,       runner: macos-14,         os: macos                  }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows                }
    continue-on-error: ${{ matrix.target == 'aarch64-linux-musl' }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      # ---- install deps ----
      - name: Install deps (Linux gnu — only used by actions that shell out)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool openssl@3

      - name: Install deps (Windows MSYS + gcc + openssl + autoconf)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            git
            gcc
            make
            autoconf
            automake
            libtool
            pkg-config
            openssl
            openssl-devel
            diffutils

      # ---- build ----
      - name: Build + smoke on Alpine (musl)
        if: matrix.libc == 'musl'
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 sh -c 'bash /w/scripts/build-alpine.sh && bash /w/scripts/smoke.sh'

      - name: Build (macOS — host arch = aarch64)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh && bash scripts/smoke.sh

      - name: Build (macOS x86_64 — cross-compile)
        if: matrix.target == 'x86_64-macos'
        env:
          IPERF_TARGET_ARCH: x86_64
          IPERF_TARGET_OS: apple-darwin
          IPERF_OS_HINT: darwin
        run: bash scripts/build.sh && bash scripts/smoke.sh

      - name: Build (Windows x86_64 — MSYS bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        env:
          IPERF_TARGET_ARCH: x86_64
          IPERF_TARGET_OS: msys
          IPERF_OS_HINT: msys
          IPERF_TRIPLET: x86_64-pc-msys
        run: bash scripts/build.sh

      # ---- package ----
      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          TARGET: ${{ matrix.target }}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1

      # ---- verify self-containedness (macOS only) ----
      - name: Verify self-contained (macOS only)
        if: matrix.os == 'macos'
        run: |
          set -e
          bin="dist/iperf3-${{ matrix.target }}/bin/iperf3"
          otool -L "$bin"
          otool -L "$bin" | grep -E '/(opt/homebrew|usr/local)/' \
            && { echo "FAIL: $bin links Homebrew dylibs"; exit 1; } || true
          echo "OK: only system libs (/usr/lib, /System/Library)"

      - name: Show file type & size
        if: matrix.os != 'windows'
        run: |
          file dist/iperf3-${{ matrix.target }}/bin/iperf3
          du -h dist/iperf3-${{ matrix.target }}.tar.xz

      - name: Show file type & size (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $exe = "dist/iperf3-${{ matrix.target }}/bin/iperf3.exe"
          file $exe
          Get-ChildItem "dist/iperf3-${{ matrix.target }}.zip" | Format-Table Name, Length

      # ---- upload artifact ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iperf3-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ---- publish on tag ----
  release:
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result != 'failure'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name '*.tar.xz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.xz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true